<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Synonyms Quiz</title>
<style>
  :root{
    --bg:#E8ECF1;
    --card:#FFFFFF;
    --ink:#151F2E;
    --muted:#6B7889;
    --line:#D3DAE3;
    --blue:#2A4B8D;
    --blue-soft:#E4EAF6;
    --good:#1C7A57;
    --good-soft:#E0F0E9;
    --bad:#A82F3C;
    --bad-soft:#F8E5E7;
    --amber:#B07B00;
    --r:14px;
    --display:Georgia,"Iowan Old Style","Times New Roman",serif;
    --body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:22px 16px 70px;background:var(--bg);color:var(--ink);
    font-family:var(--body);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto}
  header{margin-bottom:16px}
  h1{font-family:var(--display);font-weight:400;font-size:29px;margin:0;letter-spacing:-.01em}
  h1 em{font-style:italic;color:var(--blue)}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}

  .btn{appearance:none;font:inherit;cursor:pointer;background:var(--blue);color:#fff;border:0;
    padding:11px 20px;border-radius:10px;font-weight:600;font-size:15px}
  .btn:hover{background:#213C74}
  .btn.ghost{background:#fff;color:var(--blue);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--blue-soft)}
  .btn.small{padding:7px 13px;font-size:13px}
  .btn:disabled{opacity:.45;cursor:default}
  .btn:focus-visible,.opt:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

  .box{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .lbl{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .seg input{position:absolute;opacity:0;width:0;height:0}
  .seg span{display:block;padding:8px 14px;border:1px solid var(--line);border-radius:9px;font-size:14px;cursor:pointer;background:#fff}
  .seg input:checked + span{background:var(--blue-soft);border-color:var(--blue);color:var(--blue);font-weight:600}
  .seg input:focus-visible + span{outline:2px solid var(--blue);outline-offset:2px}

  .meter{display:flex;gap:3px;margin:14px 0 4px;flex-wrap:wrap}
  .meter i{flex:1;min-width:8px;height:5px;border-radius:2px;background:var(--line)}
  .meter i.g{background:var(--good)} .meter i.b{background:var(--bad)} .meter i.n{background:var(--blue)}

  .topline{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:2px}
  .banner{background:var(--blue-soft);border:1px solid #C6D3EC;color:var(--blue);
    border-radius:11px;padding:10px 14px;font-size:13px;margin-bottom:14px}
  .banner.warn{background:#FBF2DC;border-color:#EBDCB0;color:var(--amber)}

  .qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:26px 22px;text-align:center;animation:in .2s ease}
  @keyframes in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .qcard .tag{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .word{font-family:var(--display);font-size:clamp(30px,8vw,46px);margin:8px 0 0;word-break:break-word}

  .opts{display:grid;gap:8px;margin-top:14px}
  .opt{appearance:none;font:inherit;text-align:left;cursor:pointer;background:var(--card);
    border:1px solid var(--line);border-radius:11px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;color:inherit}
  .opt:hover:not(:disabled){border-color:var(--blue)}
  .opt:disabled{cursor:default}
  .opt .ltr{font-family:var(--display);font-size:15px;width:24px;height:24px;flex:none;border-radius:6px;
    background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .opt .txt{flex:1;min-width:0;font-size:15px}
  .opt .more{color:var(--muted);font-size:13px}
  .opt.right{background:var(--good-soft);border-color:var(--good)}
  .opt.right .ltr{background:var(--good);color:#fff}
  .opt.wrong{background:var(--bad-soft);border-color:var(--bad)}
  .opt.wrong .ltr{background:var(--bad);color:#fff}
  .opt.dim{opacity:.5}

  .fb{margin-top:14px;border-radius:12px;border:1px solid var(--line);background:var(--card);padding:16px;display:none}
  .fb.on{display:block}
  .fb h3{margin:0 0 4px;font-size:15px}
  .fb h3.ok{color:var(--good)} .fb h3.no{color:var(--bad)}
  .grp{padding:11px 0;border-top:1px solid var(--line)}
  .grp .head{font-family:var(--display);font-size:18px}
  .grp .head .ru{font-family:var(--body);font-size:14px;color:var(--muted)}
  .grp .syn{font-size:14px;color:var(--muted);margin-top:3px;line-height:1.45}
  .grp .role{font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
  .grp .role.ok{color:var(--good)} .grp .role.no{color:var(--bad)}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:9px;margin:0 0 16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px}
  .stat b{display:block;font-family:var(--display);font-size:27px;line-height:1.15}
  .stat span{font-size:12px;color:var(--muted)}
  ul.list{list-style:none;margin:8px 0 0;padding:0}
  ul.list li{padding:9px 0;border-top:1px solid var(--line);font-size:14px}
  ul.list li b{font-family:var(--display);font-size:16px;font-weight:400}
  ul.list li .ru{color:var(--muted)}
  .note{font-size:12.5px;color:var(--muted);margin-top:18px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="wrap">
  <header>
    <h1>Synonym<em>s</em> Quiz</h1>
    <div class="sub" id="sub"></div>
  </header>

  <!-- СТАРТ -->
  <section id="home">
    <div class="stats">
      <div class="stat"><b id="sSeen">0</b><span>слов пройдено</span></div>
      <div class="stat"><b id="sErr">0</b><span>в работе над ошибками</span></div>
      <div class="stat"><b id="sAcc">—</b><span>точность</span></div>
      <div class="stat"><b id="sQ">0</b><span>квизов</span></div>
    </div>
    <div class="box">
      <span class="lbl">Вопросов в квизе</span>
      <div class="seg" id="len">
        <label><input type="radio" name="len" value="10"><span>10</span></label>
        <label><input type="radio" name="len" value="12" checked><span>12</span></label>
        <label><input type="radio" name="len" value="15"><span>15</span></label>
      </div>
      <div class="row">
        <button class="btn" id="go">Начать квиз</button>
        <button class="btn ghost" id="goErr" hidden>Только ошибки</button>
      </div>
      <p class="note" id="homeNote"></p>
    </div>
    <div class="box" style="margin-top:14px">
      <span class="lbl">Слова, где были ошибки</span>
      <ul class="list" id="errList"></ul>
      <div class="row" style="margin-top:12px">
        <button class="btn ghost small" id="reset">Сбросить весь прогресс</button>
      </div>
    </div>
  </section>

  <!-- КВИЗ -->
  <section id="quiz" hidden>
    <div id="banner"></div>
    <div class="topline"><span id="qn"></span><span id="qs"></span></div>
    <div class="meter" id="meter"></div>
    <div class="qcard" style="margin-top:14px">
      <div class="tag">Подбери группу синонимов</div>
      <div class="word" id="word"></div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="fb" id="fb"></div>
    <div class="row" style="margin-top:14px" id="afterRow" hidden>
      <button class="btn" id="next">Дальше</button>
      <button class="btn ghost small" id="quit">Выйти</button>
    </div>
  </section>

  <!-- ИТОГИ -->
  <section id="done" hidden>
    <div class="box">
      <span class="lbl">Квиз закончен</span>
      <div style="font-family:var(--display);font-size:28px;margin:6px 0 2px" id="dScore"></div>
      <p class="note" style="margin-top:4px" id="dNote"></p>
      <ul class="list" id="dList"></ul>
      <div class="row" style="margin-top:16px">
        <button class="btn" id="again">Следующий квиз</button>
        <button class="btn ghost" id="home2">На главную</button>
      </div>
    </div>
  </section>
</div>

<script>
/* ===== ДАННЫЕ: строго из PDF (слово | перевод | синонимы) ===== */
const RAW = [
["Amazing","удивительный","incredible, unbelievable, improbable, fabulous, wonderful, fantastic, astonishing, astounding, extraordinary"],
["Anger","гнев","enrage, infuriate, arouse, exasperate, inflame, madden"],

["Awful","ужасный","dreadful, terrible, abominable, bad, poor, unpleasant"],

["Definite","определённый","certain, sure, positive, determined, clear, distinct, obvious"],
["Delicious","вкусный","savory, appetizing, luscious, scrumptious, palatable, delightful, enjoyable, toothsome, exquisite, yummy"],
["Describe","описывать","portray, characterize, picture, narrate, relate, recount, represent, report"],
["Destroy","разрушать","ruin, demolish, raze, waste, kill, slay, end, extinguish"],

["Do","делать","implement, conclude, effect, accomplish, achieve, attain, make"],
["Dull","скучный","boring, tiring, tiresome, uninteresting, slow, dumb, tedious, wearisome, monotonous"],
["Eager","страстно желающий","keen, enthusiastic, involved, interested"],
["End","заканчивать","stop, finish, conclude, close"],
["Enjoy","наслаждаться","appreciate, delight in, be pleased, indulge in, luxuriate in, bask in, relish, devour, savor, like"],
["Explain","объяснять","elaborate, clarify, define, interpret, justify, account for"],
["Fair","справедливый","just, impartial, unbiased, objective, unprejudiced, honest"],
["Fall","падать","drop, descend, plunge, tumble"],
["False","ложный","fake, untrue, unfounded, erroneous, deceptive, groundless, fallacious, incorrect"],
["Famous","известный","well-known, popular, renowned, celebrated, famed, eminent, illustrious, distinguished, noted, notorious"],
["Fast","быстрый","quick, rapid, speedy, rapidly, quickly, speedily, lickety-split, posthaste, hastily, expeditiously, like a flash"],
["Fat","толстый","stout, corpulent, fleshy, beefy, full"],
["Fear","страх","fright, dread, terror, alarm, dismay, anxiety, scare, awe, horror, panic, apprehension"],
["Fly","летать","soar, hover, flit, wing, flee, waft, glide, coast, skim, sail, cruise"],
["Funny","забавный","humorous, amusing, droll, comic, comical, laughable, silly"],
["Get","получать","acquire, achieve, obtain, gain, fetch, find, score, accumulate"],
["Go","уходить","recede, depart, fade, disappear, move, proceed"],
["Good","хороший","excellent, fine, superior, wonderful, marvelous, qualified, suited, suitable, capable, generous, kindly, friendly, gracious, obliging, pleasant, agreeable, pleasurable, satisfactory, well-behaved, obedient, honorable, reliable, trustworthy, favorable, profitable, advantageous, righteous, expedient, helpful, valid, genuine, ample, salubrious, estimable, beneficial, splendid, great, noble, worthy, first-rate, top-notch, grand, sterling, superb, respectable, edifying"],
["Great","великий","noteworthy, worthy, distinguished, remarkable, grand, considerable, powerful, much, mighty"],
["Gross","грубый, вульгарный","improper, rude, coarse, indecent, crude, vulgar, outrageous, extreme, grievous, shameful, uncouth, obscene, low"],

["Hate","ненавидеть","despise, loathe, detest, abhor, disfavor, dislike, disapprove, abominate"],
["Have","иметь","hold, possess, own, contain, acquire, gain"],
["Help","помогать","support, encourage"],
["Hide","прятать","conceal, cover, cloak"],
["Hurry","торопиться","rush, run, speed, race, urge, accelerate"],
["Hurt","причинять боль","damage, harm, injure, wound, afflict, pain"],
["Idea","мысль","thought, concept, conception, notion, understanding, opinion, plan, view, belief"],
["Important","важный","necessary, vital, critical, indispensable, valuable, essential, significant"],
["Interesting","интересный","fascinating, engaging, keen, bright, exciting, entertaining, curious, captivating, enchanting, appealing"],
["Keep","держать","hold, retain, withhold, preserve, maintain, sustain, support"],
["Kill","убивать","slay, execute, murder, destroy, cancel, abolish"],
["Lazy","ленивый","indolent, slothful, inactive"],
["Little","маленький","tiny, small, diminutive, runt, miniature, puny, exiguous, cramped"],
["Look","смотреть","gaze, see, watch, survey, study, seek, search for, examine, observe, discover, notice, recognize, explore"],
["Love","любить","like, admire, esteem, fancy, care for, adore"],
["Make","делать","create, originate, invent, beget, form, construct, design, produce, build, develop, do, effect, execute, compose, accomplish"],
["Mark","отмечать","label, tag, price, ticket, impress, effect, trace, note, notice"],
["Mischievous","озорной","playful, naughty"],
["Move","двигаться","go, creep, crawl, drag, toddle"],
["Moody","легко поддающийся переменам настроения","temperamental, changeable, short-tempered, spiteful, sulky, touchy"],
["Neat","опрятный","clean, tidy, elegant, desirable, well-kept, shapely"],
["New","новый","fresh, original, unusual, modern, current, recent"],
["Old","старый","ancient, aged, old-fashioned, outmoded, traditional, archaic, conventional, obsolete, extinct"],
["Part","часть","portion, share, piece, section, fraction, fragment"],
["Place","место","space, area, location, position, station"],
["Plan","план","plot, scheme, design, method, way"],
["Popular","популярный","well-liked, approved, accepted, favorite, celebrated"],
["Predicament","затруднение","quandary, dilemma, pickle, problem"],
["Put","класть","place, set, attach"],
["Quiet","тихий","silent, still, soundless, mute, tranquil, peaceful, calm, restful"],
["Right","правильный","correct, accurate, factual, true, good, just, honest, upright, lawful, moral, proper, suitable, apt, legal, fair"],
["Run","бежать","race, speed, hurry, hasten, sprint, dash, rush, escape"],
["Say/Tell","сказать","inform, notify, advise, relate, recount, narrate, explain, reveal, disclose, speak, express, verbalize, voice, articulate, pronounce, deliver, convey, impart, assert, state"],
["Scared","испуганный","afraid, frightened, alarmed, terrified, panicked, fearful, insecure, timid, shy, worried, troubled, disturbed, horrified"],
["Show","показывать","display, exhibit, present, note, point to, indicate, explain, reveal, prove, demonstrate, expose"],
["Slow","медленный","unhurried, gradual, leisurely, late, behind, tedious, slack"],
["Stop","останавливаться","cease, halt, stay, pause, discontinue, conclude, end, finish, quit"],
["Story","история","tale, myth, legend, fable, yarn, account, narrative, chronicle, epic, sage, anecdote, record, memoir"],
["Strange","странный","odd, peculiar, unusual, unfamiliar, uncommon, queer, weird"],
["Take","брать","hold, catch, capture, acquire, pick, choose, select, assume"],
["Tell","рассказывать","disclose, reveal, show, expose, uncover, relate, narrate, inform, advise, explain, divulge, declare, command, order, bid, recount, repeat"],
["Think","думать","judge, deem, assume, believe, consider, contemplate, reflect, mediate"],
["Trouble","проблема","distress, anguish, anxiety, worry, pain, danger, peril, disaster, grief, misfortune, difficulty, concern, pains, inconvenience, effort"],
["True","верный, точный","accurate, right, proper, precise, exact, valid, genuine, real, actual, trusty, steady, loyal, dependable, sincere"],
["Ugly","некрасивый","horrible, unpleasant, terrifying"],
["Unhappy","несчастный","miserable, uncomfortable, wretched, heart-broken, unfortunate, poor, sorrowful, depressed, discouraged, sad"],
["Use","использовать","utilize, spend, expend, consume"],
["Wrong","неверный, неправильный","incorrect, inaccurate, mistaken, unsuitable"]
];
const W = RAW.map((r,i)=>({id:i, en:r[0], ru:r[1], syn:r[2].split(', ')}));
const TOTAL = W.length;

/* ===== состояние ===== */
let P = { used:[], err:[], quizzes:0, asked:0, right:0 };
let saveOK = true;
const $ = id=>document.getElementById(id);

/* работает и внутри Claude (window.storage), и на обычном хостинге (localStorage) */
const DB={
  async get(k){
    if(window.storage){ try{ const r=await window.storage.get(k); if(r&&r.value) return r.value; }catch(e){} }
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k,v){
    if(window.storage){ try{ await window.storage.set(k,v); return true; }catch(e){} }
    try{ localStorage.setItem(k,v); return true; }catch(e){ return false; }
  }
};
async function load(){
  try{ const v = await DB.get('syn:v2'); if(v) P = JSON.parse(v); }catch(e){}
  P.used=P.used||[]; P.err=P.err||[];
}
async function save(){ saveOK = await DB.set('syn:v2', JSON.stringify(P)); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ===== главная ===== */
function drawHome(){
  $('sSeen').textContent = P.used.length + ' / ' + TOTAL;
  $('sErr').textContent = P.err.length;
  $('sQ').textContent = P.quizzes;
  $('sAcc').textContent = P.asked ? Math.round(P.right/P.asked*100)+'%' : '—';
  $('goErr').hidden = P.err.length < 4;
  $('sub').textContent = 'Все слова, синонимы и переводы — из твоего PDF (' + TOTAL + ' слов)';

  const left = TOTAL - P.used.length;
  $('homeNote').textContent = (left>0
      ? 'Первый круг: осталось новых слов — ' + left + '. Слова не повторяются, пока не пройдут все.'
      : 'Круг пройден полностью. Дальше идут итоговые квизы: все ' + TOTAL + ' слов вперемешку.')
    + (P.err.length ? ' Слова с ошибками добавляются в начало каждого квиза автоматически.' : '')
    + (saveOK ? '' : ' Внимание: сохранить прогресс не удалось, он живёт только до закрытия страницы.');

  const ul = $('errList');
  if(!P.err.length){ ul.innerHTML = '<li style="color:var(--muted)">Пока ошибок нет.</li>'; return; }
  ul.innerHTML='';
  P.err.forEach(id=>{
    const w=W[id], li=document.createElement('li');
    const b=document.createElement('b'); b.textContent=w.en;
    const s=document.createElement('span'); s.className='ru'; s.textContent=' — '+w.ru;
    li.append(b,s); ul.append(li);
  });
}

/* ===== сборка квиза ===== */
let Q=[], idx=0, score=0, results=[], answered=false, errMode=false;

function buildQuiz(len, onlyErr){
  let ids=[];
  if(onlyErr){ ids = shuffle(P.err).slice(0,len); }
  else{
    ids = shuffle(P.err).slice(0, Math.min(P.err.length, Math.floor(len/2)));
    let fresh = W.map(w=>w.id).filter(id=>!P.used.includes(id) && !ids.includes(id));
    if(!fresh.length) fresh = W.map(w=>w.id).filter(id=>!ids.includes(id)); // итоговый квиз
    ids = ids.concat(shuffle(fresh).slice(0, len-ids.length));
  }
  return shuffle(ids).map(id=>{
    const w = W[id];
    // отвлекающие: другие слова из PDF, по возможности с другим переводом
    let pool = W.filter(x=>x.id!==id && x.ru!==w.ru);
    if(pool.length<3) pool = W.filter(x=>x.id!==id);
    const wrong = shuffle(pool).slice(0,3);
    return { id, opts: shuffle([w, ...wrong]).map(x=>x.id) };
  });
}
function startQuiz(onlyErr){
  const len = +document.querySelector('input[name="len"]:checked').value;
  errMode = !!onlyErr;
  Q = buildQuiz(len, onlyErr);
  if(!Q.length) return;
  idx=0; score=0; results=[];
  $('home').hidden=true; $('done').hidden=true; $('quiz').hidden=false;
  const fromErr = Q.filter(q=>P.err.includes(q.id)).length;
  const finalRound = P.used.length>=TOTAL;
  let b='';
  if(onlyErr) b = '<div class="banner warn">Работа над ошибками: ' + Q.length + ' ' + plural(Q.length,'слово','слова','слов') + ', в которых ты ошибался.</div>';
  else if(fromErr) b = '<div class="banner warn">В этом квизе ' + fromErr + ' ' + plural(fromErr,'слово','слова','слов') + ' из твоих прошлых ошибок' + (finalRound?'':', остальные — новые') + '.</div>';
  else b = '<div class="banner">' + (finalRound ? 'Итоговый квиз: все ' + TOTAL + ' слов вперемешку.' : 'Новые слова. Пройдено ' + P.used.length + ' из ' + TOTAL + '.') + '</div>';
  $('banner').innerHTML = b;
  render();
}
function plural(n,a,b,c){ n=Math.abs(n)%100; const m=n%10;
  if(n>10&&n<20) return c; if(m>1&&m<5) return b; if(m===1) return a; return c; }

const LTR = ['A','B','C','D'];
function preview(w){ const s=w.syn; return s.slice(0,4).join(', ') + (s.length>4 ? ' …' : ''); }

function render(){
  answered=false;
  const q = Q[idx], w = W[q.id];
  $('qn').textContent = 'Вопрос ' + (idx+1) + ' из ' + Q.length;
  $('qs').textContent = idx ? score + ' / ' + idx + ' верно' : '';
  const m = $('meter'); m.innerHTML='';
  Q.forEach((_,i)=>{ const e=document.createElement('i');
    if(results[i]===true) e.className='g'; else if(results[i]===false) e.className='b'; else if(i===idx) e.className='n';
    m.append(e); });
  $('word').textContent = w.en;
  $('fb').className='fb'; $('fb').innerHTML=''; $('afterRow').hidden=true;
  const box = $('opts'); box.innerHTML='';
  q.opts.forEach((oid,i)=>{
    const ow = W[oid];
    const b = document.createElement('button'); b.className='opt';
    const l = document.createElement('span'); l.className='ltr'; l.textContent=LTR[i];
    const t = document.createElement('span'); t.className='txt'; t.textContent = preview(ow);
    b.append(l,t);
    b.onclick = ()=>answer(i);
    box.append(b);
  });
  $('qcard') // no-op
}
function groupBlock(w, role){
  const d = document.createElement('div'); d.className='grp';
  if(role){ const r=document.createElement('div'); r.className='role '+(role==='ok'?'ok':'no');
    r.textContent = role==='ok' ? 'Правильная группа' : 'Твой ответ'; d.append(r); }
  const h = document.createElement('div'); h.className='head';
  h.textContent = w.en + ' ';
  const ru = document.createElement('span'); ru.className='ru'; ru.textContent='— ' + w.ru;
  h.append(ru); d.append(h);
  const s = document.createElement('div'); s.className='syn'; s.textContent = w.syn.join(', ');
  d.append(s); return d;
}
function answer(i){
  if(answered) return; answered=true;
  const q=Q[idx], w=W[q.id], chosen=W[q.opts[i]];
  const ok = chosen.id===w.id;
  results[idx]= ok; if(ok) score++;
  P.asked++; if(ok) P.right++;
  if(!P.used.includes(w.id)) P.used.push(w.id);
  if(ok){ P.err = P.err.filter(x=>x!==w.id); }
  else if(!P.err.includes(w.id)){ P.err.push(w.id); }
  save();

  [...$('opts').children].forEach((b,j)=>{
    b.disabled=true;
    const oid=q.opts[j];
    if(oid===w.id) b.classList.add('right');
    else if(j===i) b.classList.add('wrong');
    else b.classList.add('dim');
  });

  const fb=$('fb'); fb.className='fb on'; fb.innerHTML='';
  const h=document.createElement('h3'); h.className=ok?'ok':'no';
  h.textContent = ok ? 'Верно' : 'Неверно';
  fb.append(h);
  const p=document.createElement('div'); p.style.fontSize='14px'; p.style.color='var(--muted)';
  p.textContent = 'Слово в вопросе: ' + w.en + ' — ' + w.ru;
  fb.append(p);
  if(!ok) fb.append(groupBlock(chosen,'no'));
  fb.append(groupBlock(w,'ok'));

  $('afterRow').hidden=false;
  $('next').textContent = (idx+1>=Q.length) ? 'К итогам' : 'Дальше';
  $('next').focus();
  const m=$('meter').children[idx]; if(m) m.className = ok?'g':'b';
}
$('next').onclick = ()=>{ if(idx+1>=Q.length) finish(); else { idx++; render(); } };
$('quit').onclick = ()=>{ $('quiz').hidden=true; $('home').hidden=false; drawHome(); };
document.addEventListener('keydown',e=>{
  if($('quiz').hidden) return;
  const k=e.key.toUpperCase();
  if(!answered && (/^[1-4]$/.test(k) || ['A','B','C','D'].includes(k))){
    const i = /^[1-4]$/.test(k) ? +k-1 : LTR.indexOf(k);
    const b=$('opts').children[i]; if(b) b.click();
  } else if(answered && e.key==='Enter'){ $('next').click(); }
});
function finish(){
  P.quizzes++; save();
  $('quiz').hidden=true; $('done').hidden=false;
  $('dScore').textContent = score + ' из ' + Q.length + ' верно';
  const wrong = Q.filter((q,i)=>results[i]===false);
  $('dNote').textContent = wrong.length
    ? 'Эти слова вернутся в следующем квизе автоматически и уйдут из списка, когда ответишь верно.'
    : 'Ошибок нет. ' + (P.err.length ? 'В списке на повтор ещё ' + P.err.length + '.' : 'Список повторов пуст.');
  const ul=$('dList'); ul.innerHTML='';
  wrong.forEach(q=>{
    const w=W[q.id], li=document.createElement('li');
    const b=document.createElement('b'); b.textContent=w.en;
    const s=document.createElement('span'); s.className='ru'; s.textContent=' — '+w.ru;
    const d=document.createElement('div'); d.style.color='var(--muted)'; d.style.marginTop='2px';
    d.textContent=w.syn.join(', ');
    li.append(b,s,d); ul.append(li);
  });
}
$('go').onclick = ()=>startQuiz(false);
$('goErr').onclick = ()=>startQuiz(true);
$('again').onclick = ()=>startQuiz(errMode && P.err.length>=4);
$('home2').onclick = ()=>{ $('done').hidden=true; $('home').hidden=false; drawHome(); };
$('reset').onclick = ()=>{ if(confirm('Сбросить пройденные слова, ошибки и статистику?')){
  P={used:[],err:[],quizzes:0,asked:0,right:0}; save(); drawHome(); } };

(async()=>{ await load(); drawHome(); })();
</script>
